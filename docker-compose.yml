services:
  solar-app:
    build: .
    container_name: solar-app
    environment:
      SOLAR_DATABASE_PATH: /app/data/solar.db
      SOLAR_FETCH_INTERVAL_SECONDS: 30
      SOLAR_TEST_DATA_PATH: /app/testdata/solar_testdaten.json
      SOLAR_SEED_TEST_DATA: "true"
    ports:
      - "8000:8000"
    volumes:
      - solar-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: solar-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - solar-app

  grafana:
    image: grafana/grafana:11.2.0
    container_name: solar-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  solar-data:
  grafana-data:
